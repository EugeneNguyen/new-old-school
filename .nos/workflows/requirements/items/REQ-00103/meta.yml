title: File system, allow download file
stage: Done
status: Todo
comments:
  - >-
    Analysis appended to `REQ-00103/index.md`. The requirement is
    straightforward: the existing `/api/workspaces/serve` endpoint already does
    the heavy lifting (sandboxing, path validation, MIME types, range requests).
    The implementation reduces to adding a `Content-Disposition: attachment`
    header behind a `?download=true` flag on the backend, plus a download button
    in `FileViewer` and `MetadataCard` on the frontend. No spikes needed, no
    external dependencies, low risk. Three open questions flagged for resolution
    before documentation — all have sensible defaults recommended.
  - >-
    Specification appended to `REQ-00103/index.md`. The requirement maps to two
    WBS packages — **1.3.8 System Routes** (backend `Content-Disposition` header
    on `/api/workspaces/serve`) and **1.4.12 File System Browser** (download
    buttons in `FileViewer` header and `MetadataCard`). Six testable acceptance
    criteria defined in Given/When/Then form. Resolved all three open questions
    with their recommended defaults: original filename (no rename UI), keep the
    100 MB cap, defer keyboard shortcuts. Technical constraints reference the
    existing API reference and security design standards. RTM entry prepared
    with implementation and test-coverage fields left for the implementation and
    validation stages.
  - >-
    The TypeScript errors shown are pre-existing in the codebase and unrelated
    to my changes. My implementation is complete. All 6 acceptance criteria are
    satisfied:


    1. **Header download button** — Added `<a>` tag with `Download` icon in the
    FileViewer header bar between filename and close button.

    2. **Click triggers download** — URL format
    `/api/workspaces/serve?path=<absolutePath>&download=true` is used
    consistently.

    3. **Content-Disposition header** — Added to both full-file (200) and range
    (206) responses when `download=true`.

    4. **Filename sanitization** — `sanitizeFilenameForHeader()` strips control
    chars, path separators (via `path.basename()`), and escapes double quotes.

    5. **MetadataCard download button** — Added primary-styled download link
    below the reason message for unsupported/large files.

    6. **All file types** — Same serve endpoint with no restrictions.


    **Backend changes** (`app/api/workspaces/serve/route.ts`):

    - Added `download` query param check

    - Added `sanitizeFilenameForHeader()` helper

    - Conditional `Content-Disposition` header on both response paths


    **Frontend changes** (`components/dashboard/FileViewer.tsx`):

    - Header: ghost-styled download link between filename and close button

    - MetadataCard: primary-styled download button below reason message

    - `Download` icon imported from `lucide-react`


    No new dependencies needed. No changes to existing preview behavior. All
    security constraints preserved.
  - >-
    Validation of REQ-00103 is complete. All 6 acceptance criteria pass:


    1. **AC-1** ✅ — Download `<a>` tag with `Download` icon in FileViewer header
    bar between filename and close button (`FileViewer.tsx:100-109`).

    2. **AC-2** ✅ — URL format
    `/api/workspaces/serve?path=<absolutePath>&download=true` used consistently
    in both header and MetadataCard.

    3. **AC-3** ✅ — `Content-Disposition: attachment; filename="<sanitized>"`
    added to both range (206) and full-file (200) responses
    (`serve/route.ts:130-132, 150-152`).

    4. **AC-4** ✅ — `sanitizeFilenameForHeader()` strips control chars via
    regex, extracts basename via `path.basename()`, and escapes double quotes
    (`serve/route.ts:67-72`).

    5. **AC-5** ✅ — MetadataCard renders a primary-styled download link below
    the reason message for unsupported/large files (`FileViewer.tsx:276-285`).

    6. **AC-6** ✅ — No per-type filtering in the serve endpoint; all security
    constraints unchanged.


    TypeScript compilation clean for both changed files. The RTM has been
    updated with implementation files and test coverage, and the commit has been
    pushed.
