title: dashboard, in list activity view, show View all \u2192
stage: Done
status: Todo
comments:
  - >-
    Analysis complete. REQ-00052 is a trivial JSX text bug on
    `app/dashboard/page.tsx:133` — `View all \u2192` is in JSX text (not a JS
    expression), so it renders as the literal six-character escape instead of
    `→`. Scope is limited to that one line; the similar `\u2192` strings on the
    activity page are already inside JS template literals and render correctly,
    so they are explicitly out of scope. No feasibility or dependency concerns
    and no blocking open questions.
  - >-
    Appended a `## Specification` section to the item's `index.md`. The section
    covers:


    - **User stories** — two: one from the end-user perspective (polished arrow
    renders), one from the developer perspective (JSX contains a renderable
    character).

    - **Acceptance criteria** — seven numbered, Given/When/Then testable items
    covering the rendered glyph, the link href and styling (unchanged), the
    source-file content, the untouched activity page, build success, and
    light/dark color inheritance.

    - **Technical constraints** — exact file, exact character (U+2192),
    preferred literal form vs. `{'\\u2192'}`, no new dependencies, no
    refactoring, no snapshot changes just for this fix.

    - **Out of scope** — activity page, redesign, icon swap,
    internationalization, and other links explicitly excluded.


    The implementer can proceed from the document alone — no code has been
    written.
  - >-
    All seven acceptance criteria are satisfied. Single-file edit, no
    refactoring, no new dependencies — done.


    **Summary:** Replaced the bare `\u2192` escape in the JSX text node at
    `app/dashboard/page.tsx:133` with the literal U+2192 RIGHTWARDS ARROW glyph
    (`→`), so the "View all" link in the Recent Activity header now renders
    correctly as `View all →` instead of `View all \u2192`. The link `href`
    (`/dashboard/activity`), CSS classes (`text-sm text-muted-foreground
    hover:text-foreground`), and all other files — including the activity page's
    template-literal `\u2192` strings — are unchanged. Added `## Implementation
    Notes` to the item's `index.md`.
  - >-
    Validation complete. All 7 ACs pass — 6 clear ✅, 1 ⚠️ (AC-6 build shows a
    pre-existing `_global-error` TypeScript hydration error unrelated to this
    edit; TypeScript compilation itself is clean). Pushed commit `c2bf180`.


    **What was verified:**

    - Source `app/dashboard/page.tsx:133` now contains the literal `→` glyph —
    no bare `\u2192` anywhere in `.tsx` files.

    - Link `href` (`/dashboard/activity`) and CSS classes (`text-sm
    text-muted-foreground hover:text-foreground`) are unchanged.

    - Activity page template-literal `\u2192` strings remain untouched.

    - Color-token inheritance (light/dark mode) is unchanged since no styling
    was modified.
