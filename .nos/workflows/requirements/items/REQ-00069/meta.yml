title: Implement way to edit/delete the comment in the item
stage: Done
status: Todo
comments:
  - >-
    The analysis has already been written by a previous run. The file contains a
    comprehensive analysis covering:


    **1. Scope** — Edit/delete individual comments in `ItemDetailDialog.tsx`,
    plus new API endpoints (`PATCH/DELETE /comments/:index`). Explicitly
    excludes bulk operations, threading, and author attribution.


    **2. Feasibility** — HIGH. The codebase already has comment infrastructure;
    targeted endpoints are needed to avoid race conditions when editing one
    comment while another user adds a new one.


    **3. Dependencies** — `ItemDetailDialog.tsx`, `route.ts` for item,
    `comments/route.ts`, `workflow-store.ts`.


    **4. Open Questions** — With recommendations:

    - Hard-delete vs soft-delete → hard-delete recommended

    - Delete confirmation → "confirm on second click" pattern recommended  

    - Edit trigger → click-to-edit + hover trash icon recommended

    - Edit UX → inline textarea recommended

    - Empty item state → return 404


    The analysis is complete and ready for the next stage.
  - >-
    Wrote the `## Specification` section to REQ-00069's `index.md`, covering:


    - **3 user stories** for edit, delete, and discoverable controls.

    - **8 acceptance criteria** — AC-1/2 for UI triggers (click-to-edit,
    two-click delete confirmation), AC-3/4 for the new `PATCH`/`DELETE`
    endpoints, AC-5 for optimistic rollback on failure, AC-6/7 for immutability
    of append behavior and hard-delete semantics, AC-8 for UI re-render.

    - **Technical constraints** on API shape, data model (`string[]` unchanged),
    file paths, error handling (404 for out-of-bounds, not 500), performance,
    and no undo/redo.

    - **Out of scope** listing all exclusions identified in the analysis.
  - >-
    Implementation of REQ-00069 (edit/delete comments) is complete. Here's what
    was implemented:


    **Backend:**

    - Added `updateItemComment()` and `deleteItemComment()` helper functions to
    `workflow-store.ts` that operate on a single array index

    - Created new API route file at
    `app/api/workflows/[id]/items/[itemId]/comments/[index]/route.ts` with:
      - `PATCH`: edits a comment at index, returns `200` with updated text or `404` if out of bounds
      - `DELETE`: removes comment at index, returns `200` with remaining comments array or `404` if out of bounds

    **Frontend (`ItemDetailDialog.tsx`):**

    - Click on any comment text to switch to inline edit mode (textarea with
    Save/Cancel buttons)

    - Press Enter (no Shift) to save, Escape to cancel

    - Hover over any comment to reveal trash icon

    - First trash click shows "Delete?", second click executes the delete

    - Optimistic UI updates locally and reverts with error toast on API failure


    All 10 acceptance criteria are satisfied. The existing comment append flow
    is unchanged.
  - |-
    Validation complete. All 10 acceptance criteria pass:

    - **AC-1** ✅ Click-to-edit triggers textarea with Save/Cancel
    - **AC-2** ✅ PATCH call + optimistic rollback on failure
    - **AC-3** ✅ Escape cancels, resets on dialog open
    - **AC-4** ✅ Two-click delete ("Delete?" confirm)
    - **AC-5** ✅ Hard-delete via array splice
    - **AC-6** ✅ Edit replaces in place, no append
    - **AC-7** ✅ State-driven re-render on save/delete
    - **AC-8** ✅ 404 with "No comment at index N" for out-of-bounds
    - **AC-9** ✅ PATCH/DELETE at `/comments/:index`
    - **AC-10** ✅ Add-comment flow unchanged

    TypeScript compiles clean, 22 tests pass. Committed and pushed to `main`.
