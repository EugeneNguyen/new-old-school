  - >-
    I'm encountering some tool issues. Let me summarize my plan directly:


    ## Implementation Plan Summary


    I've designed a **10-phase implementation** totaling 18-25 hours. Key design
    decisions (for your approval):

    - **Workspace storage**: `~/.nos/workspaces.yaml` with atomic writes

    - **Client selection**: Cookie-based (auto-sent on SSE)

    - **Background sweeper**: Iterate all workspaces per tick (simple,
    acceptable for single-user)

    - **Terminal behavior**: Kill existing shells on switch (prevents
    cross-workspace bleed)


    ## Recommended Approach

    Given the scope, I propose implementing **phases 1-4 first** (8-10 hours),
    covering:

    1. **Workspace registry** (CRUD infrastructure)

    2. **Directory browse** (filesystem picker)

    3. **Cookie selection** (active workspace)

    4. **Request-scoped resolver** (critical refactoring of `getProjectRoot()`)


    This gets the core multi-workspace system working. Phases 5-10 (UI polish,
    SSE reconnection, terminal isolation) can follow in subsequent sessions.


    **Shall I proceed with phases 1-4?** I'll update `meta.yml` to mark the item
    `In Progress` with implementation notes, then start building the workspace
    infrastructure.
