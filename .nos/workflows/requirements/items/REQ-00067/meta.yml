  - >-
    Specification added to REQ-00067. Formalized 6 user stories covering
    developer workflows, end-user UI interactions, and operator concerns; 25
    acceptance criteria covering workspace CRUD, directory browsing, active
    workspace selection, content reloading, bootstrapping, and concurrency; 10
    technical constraints addressing path security, request-scoped resolution,
    background processes, SSE lifecycle, terminal isolation, and client-side
