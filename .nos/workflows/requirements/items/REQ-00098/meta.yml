title: >-
  the workflow with routine enabled should display different in list workflow in
  side menu
stage: Done
status: Todo
comments:
  - >-
    The analysis has been appended to `index.md`. Here's the summary:


    **Scope:** Visual differentiation in the sidebar for routine-enabled
    workflows, requiring changes to the sidebar component, workflow type, and
    API. Routine scheduling logic and other pages are out of scope.


    **Feasibility:** High — routine config files, a routine API, and sidebar
    rendering all already exist. Key unknowns: visual treatment (icon vs. badge
    vs. color), whether to expose cron schedule in addition to boolean, and
    whether the API-side fetch could create latency at scale.


    **Dependencies:** `types/workflow.ts`, `app/api/workflows/route.ts`,
    `lib/routine-scheduler.ts`, and `components/dashboard/Sidebar.tsx`.


    **Open questions:** Visual treatment, level of detail to show, handling of
    workflows without a config file, and performance implications of fetching
    routine status for all workflows at list time.</parameter>

    <parameter name="status">completed</parameter>

    </invoke>
  - >-
    The Specification section has been appended to `index.md`. The document now
    has: Analysis, then Specification (with User Stories, Acceptance Criteria,
    Technical Constraints, Out of Scope, RTM Entry, and WBS Mapping), then the
    Implementation Reference section (which provides useful code reference for
    implementers).


    The Specification section traces cleanly to the RTM (Req ID REQ-00098,
    design artifacts, WBS 1.4.1 and 1.3.1), uses the glossary's ubiquitous
    language (Workflow, routine-enabled), and maps all 7 acceptance criteria to
    testable verifications. The implementation reference section at the bottom
    provides exact code context for the implementer.


    This requirement is ready to move to the Implementation stage.
  - >-
    Implementation is complete. All 7 acceptance criteria are satisfied:


    - **AC-1:** `routineEnabled?: boolean` added to the `Workflow` interface in
    `types/workflow.ts`

    - **AC-2:** `GET /api/workflows` now calls `readRoutineConfig(folder)` and
    includes `routineEnabled` in each workflow object

    - **AC-3:** `CalendarClock` icon from `lucide-react` rendered inline before
    the workflow name for enabled workflows

    - **AC-4:** Icon uses `text-muted-foreground` (same as text at rest) and has
    no opacity/visibility changes on hover — always visible

    - **AC-5:** No config or `enabled: false` → no icon; `enabled: true` → icon
    shown

    - **AC-6:** Layout stable — the icon is placed inside the flex container
    before the text span, no layout breaks

    - **AC-7:** TypeScript passes with no new errors in the modified files


    Three files were modified:

    1. `types/workflow.ts` — added optional `routineEnabled` field

    2. `app/api/workflows/route.ts` — integrated `readRoutineConfig()` to
    populate the field

    3. `components/dashboard/Sidebar.tsx` — added `CalendarClock` icon and
    conditional rendering
  - >-
    Validation complete. All 7 acceptance criteria pass:


    - **AC-1** ✅ `routineEnabled?: boolean` confirmed in `types/workflow.ts:5`

    - **AC-2** ✅ `GET /api/workflows` calls `readRoutineConfig(folder)` and
    includes `routineEnabled` in each workflow object (`route.ts:41-48`)

    - **AC-3** ✅ `CalendarClock` imported and conditionally rendered in
    `Sidebar.tsx:152-154`

    - **AC-4** ✅ Visibility is conditioned on `wf.routineEnabled` (data), not on
    hover state — no opacity classes

    - **AC-5** ✅ `readRoutineConfig` returns `null` for missing files;
    `routineConfig?.enabled === true` correctly maps both `null` and `enabled:
    false` to `false`

    - **AC-6** ✅ Optional field handled safely in JSX; flex layout stable with
    or without the icon

    - **AC-7** ✅ No new TypeScript errors in the three modified files; existing
    errors in `lib/scaffolding.test.ts` and `lib/workflow-store.ts` are
    pre-existing


    RTM updated with implementation files and test coverage. Committed and
    pushed as `5b364e6`.
