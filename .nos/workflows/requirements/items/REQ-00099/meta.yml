comments:
  - >-
    Analysis appended to `REQ-00099/index.md`. The key finding is that the
    sidebar has **two rendering layers** — tool registry items from
    `config/tools.json` and hardcoded Activity/Workflows sections in JSX. The
    requested order interleaves both, requiring changes to both layers. The most
    important open question is whether "Workflows" should become a Link
    (navigating to `/dashboard/workflows`) or remain a collapsible button — this
    is a UX decision that blocks implementation.
  - >-
    The `## Specification` section has been appended to `REQ-00099/index.md`.
    The spec resolves the three open questions from the analysis by adopting the
    approach that keeps Workflows as a collapsible button and Activity as a Link
    — ordering is achieved purely by changing the render sequence in
    `Sidebar.tsx` without modifying `config/tools.json` or converting Workflows
    to a Link. Key decisions documented:


    - **Workflows stays as a collapsible `<button>`** (not a Link) —
    expand/collapse behavior preserved.

    - **Activity stays as a `<Link>` to `/dashboard/activity`** — navigation
    behavior unchanged.

    - **Ordering done in `Sidebar.tsx` render sequencing** — `config/tools.json`
    array order is not changed.

    - **RTM entry** maps to WBS package 1.4.1 (Dashboard Shell) with
    `components/dashboard/Sidebar.tsx` as the sole implementation file.

    - **8 acceptance criteria** cover expanded/collapsed states, active
    highlighting, and non-regression.
  - >-
    All acceptance criteria satisfied. The nav now renders in the requested
    order (Dashboard → Workflows → Files → Claude Terminal → Members → Activity
    → Settings), with Workflows remaining a collapsible button and Activity
    remaining a Link to `/dashboard/activity`. The `config/tools.json` order was
    not modified. The collapsed sidebar displays icons in the same top-to-bottom
    sequence.
  - >-
    All 8 acceptance criteria for REQ-00099 pass. The sidebar now renders in the
    required order (Dashboard → Workflows → Files → Claude Terminal → Members →
    Activity → Settings), with Workflows remaining a collapsible `<button>`,
    Activity remaining a `<Link>` to `/dashboard/activity`, `config/tools.json`
    unchanged, active highlighting intact, and the expand/collapse state fully
    preserved. The RTM has been updated with the implementation file and status
    set to Done. Changes committed and pushed.
