title: Add stage button should be inside of a workflow setting
stage: Done
status: Todo
comments:
  - >-
    Analysis appended to `REQ-00059/index.md` under an `## Analysis` section
    covering scope, feasibility, dependencies, and open questions. Key findings:
    `Add stage` currently lives in `WorkflowItemsView.tsx:168-170` and must be
    relocated to a new per-workflow settings surface; `AddStageDialog` and
    `StageDetailDialog` can be reused; POST/PATCH/DELETE stage APIs already
    exist and the server-side "no items" delete guard is in place; the only
    genuinely new work is a **reorder stages** primitive in
    `lib/workflow-store.ts` plus a `PUT /api/workflows/[id]/stages/order`
    endpoint, with a small risk around heartbeat sweeper behavior after reorder
    that should be spiked. Six open questions flagged (settings route vs. modal,
    DnD vs. arrows, kanban shortcut removal, delete UX, mid-run reorder,
    concurrent rename) — these should be resolved before Documentation.
  - >-
    Specification appended to `REQ-00059/index.md` under `## Specification` with
    7 user stories, 24 numbered acceptance criteria grouped by surface
    (route/entry point, list, add, edit, delete, reorder, hook), explicit
    technical constraints (new `PUT /api/workflows/[id]/stages/order` endpoint,
    `reorderStages` store primitive, route shape
    `app/dashboard/workflows/[id]/settings/page.tsx`, reused
    `AddStageDialog`/`StageDetailDialog`, removed button at
    `WorkflowItemsView.tsx:168-170`), and out-of-scope list. All six open
    questions were resolved up front (dedicated route, up/down arrows MVP,
    kanban shortcut preserved, delete disabled when non-empty with server 409
    fallback, mid-run reorder allowed, 409 on concurrent name-set mismatch) so
    the Documentation stage has no remaining ambiguity.
