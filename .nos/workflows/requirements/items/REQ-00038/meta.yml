title: Remove ID when Add item
stage: Documentation
status: Todo
comments:
  - >-
    Analysis appended to index.md. Scope: UI-only removal of the optional ID
    field from NewItemDialog (lines 41/51/72/119-129); server already
    auto-generates IDs when id is omitted, so no backend change needed.
    Feasibility: low risk, single-file change, no migration. Dependencies
    read-only: API route (app/api/workflows/[id]/items/route.ts) and
    lib/workflow-store.ts#createItem. Open questions: whether to surface the
    generated ID to the user post-create, whether to also tighten the API, and
    whether any workflow relies on manual ID prefixes — recommend confirming
    with product before implementation.
  - >-
    Added ## Specification to index.md: 3 user stories, 9 numbered acceptance
    criteria covering UI removal, state cleanup, request-body shape (no id),
    auto-generated ID appearing on the new card, preserved title/error/reset
    behavior, and explicit non-change to the POST route; technical constraints
    pin the single file to edit (components/dashboard/NewItemDialog.tsx), the
    exact post-change request shape, and the manual smoke test as validation;
    out-of-scope list codifies the three open questions from Analysis as
    explicit non-goals (keep API's optional id, no post-create ID toast, no
    automated tests). Implementer should need no further clarification.
  - >-
