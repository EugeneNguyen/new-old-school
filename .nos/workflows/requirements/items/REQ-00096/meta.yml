    Specification for REQ-00096 is complete. I wrote the `## Specification`
    section with 5 user stories, 12 Gherkin-style acceptance criteria, detailed
    technical constraints (API endpoints, data shapes, file paths, security,
    performance), explicit out-of-scope items, an RTM entry, and WBS mapping. I
    also added the corresponding row to `docs/standards/rtm.md`.


    Key design decisions resolved from the Analysis open questions: (1) binary
    files served via a new `/api/workspaces/serve` streaming endpoint with
    workspace sandboxing; (2) sidebar "Files" re-pointed to `/dashboard/files`,
    existing workspaces page unchanged; (3) sandboxing enforced at the API level
    via `realpathSync` comparison; (4) 100 MB size cap for inline binary
    preview; (5) unsupported file types show a metadata card.
  - >-
