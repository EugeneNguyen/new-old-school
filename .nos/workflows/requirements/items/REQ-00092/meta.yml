    icons, formatted sizes, real-time search, and a file preview panel. The
    browse API has been extended with `isDirectory`/`size`/`modified` fields and
    server-side sorting. A new `/api/workspaces/preview` endpoint serves up to
    100 lines of text content with the same security validations as browse. All
    11 acceptance criteria are satisfied per the Validation section already
    present in the item. I've appended an `## Implementation Notes` section to
