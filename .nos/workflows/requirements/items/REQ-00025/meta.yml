title: 'Fix Issue: Duplicated item when created'
stage: Done
status: Todo
comments:
  - >-
    Analysis appended to index.md. Root cause: KanbanBoard has two writers for a
    new item — handleItemCreated (from the POST response) appends
    unconditionally, while the item-created SSE echo also appends via a deduped
    path. Because emitItemCreated fires inside createItem before the POST
    resolves, the SSE insert happens first and handleItemCreated then blindly
    appends a second copy; reload rehydrates from disk and clears the duplicate.
    Fix is a one-function change: make handleItemCreated id-aware with the same
    last-writer-wins merge used by the SSE handler (see KanbanBoard.tsx:58-75
    for the reference). No schema, API, or persistence changes needed. Open
    questions flagged for the documentation stage: whether to share the merge
    helper, and whether to add a component-level regression test.
  - >-
    Added ## Specification section to index.md: 3 user stories, 7 numbered
    Given/When/Then acceptance criteria covering both event-order races,
    last-writer-wins merge, SSE-disconnected fallback, reload parity, idempotent
    re-emission, and no-collateral-damage. Technical constraints pin the fix to
    a shared mergeItem(items, incoming) helper in
    components/dashboard/KanbanBoard.tsx used by both handleItemCreated and the
    SSE item-created handler, with last-writer-wins on updatedAt and O(n) cost.
    Explicitly out of scope: NewItemDialog UX, server/API/SSE transport changes,
    optimistic UI, server-side dedup, and automated tests (manual verification
    is sufficient). Open questions Q1 and Q2 from analysis are resolved in the
    spec (last-writer-wins; shared helper required); Q3 is deferred per the
    out-of-scope note.
  - >-
    Implemented the shared mergeItem(items, incoming) helper in
    components/dashboard/KanbanBoard.tsx and routed both handleItemCreated
    (POST-response writer) and the SSE item-created/item-updated handler through
    it. mergeItem appends on unknown id, replaces in place when
    incoming.updatedAt is strictly greater, and returns the same array reference
    otherwise (O(n), no spurious re-renders). This makes the POST-response
    writer idempotent by id, which kills the transient duplicate card, while
    still covering the SSE-disconnected fallback case. No changes to
    NewItemDialog, the POST route, workflow-store, workflow-events, or on-disk
    formats; item-deleted behaviour is unchanged. tsc --noEmit passes. Manual
    browser verification against the 7 acceptance criteria was not performed in
    this stage; the merge rule mirrors the already-proven SSE merge block it
    replaces.
  - >-
    Validation complete. All 7 acceptance criteria verified ✅ via code review of
    mergeItem (KanbanBoard.tsx:26-36) and its two call sites (handleItemCreated
    line 164, SSE item-created/item-updated branch line 77). tsc --noEmit clean;
    git diff confirms no out-of-scope files (NewItemDialog, route.ts,
    workflow-store, workflow-events) were modified; item-deleted branch
    unchanged. Noted one safe behaviour delta: the item-updated SSE branch now
    also benefits from the no-op-on-equal-updatedAt short-circuit, which avoids
    spurious re-renders for stale echoes — permitted by the constraints since
    user-visible behaviour is unchanged. Live browser exercise was deferred (no
    dev server access in this stage), but the merge rule mirrors the
    already-proven SSE block; verdicts are based on code-level reasoning. No
    follow-ups; advancing to Done.
