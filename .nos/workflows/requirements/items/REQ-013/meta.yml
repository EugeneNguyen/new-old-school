title: Workflow Kanban Screen
stage: Backlog
status: Todo
comments:
  - >-
    Analysis stage complete. Appended a ## Analysis section to index.md covering
    scope (Kanban at /dashboard/workflows/[id] driven by stages.yaml + items/,
    with DnD, detail dialog, and SSE live updates in scope; stage editing and
    workflow CRUD out), feasibility (viable on existing stack; risks: concurrent
    writes vs optimistic UI, large-workflow read cost, manual-drag vs
    auto-advance semantics, DnD a11y, failed-item recovery UX), dependencies
    (REQ-011/012/014/00018; lib/workflow-store, workflow-events SSE,
    items/stages APIs, types/workflow, existing dashboard components), and 7
    open questions for Documentation to resolve (manual drag triggers prompts?,
    failed-item reset UX, per-stage maxDisplayItems, intra-column ordering,
    sidebar nav, running-stage indicator, malformed-YAML surfacing). Did not
    modify original request text or start implementation.
  - >-
    Added a formal Specification section to REQ-013 covering user stories,
    numbered acceptance criteria, technical constraints, and explicit
    out-of-scope boundaries. The spec resolves the main open UX questions by
    defining manual drag as a pure stage/status mutation that resets moved items
    to Todo without triggering prompts, keeps failed-item recovery discoverable
    via the item UI, and requires SSE-based reconciliation for concurrent
    updates.
  - >-
    Added and tightened the Specification section in REQ-013 so it can serve as
    the implementation source of truth. It now defines user stories, numbered
    acceptance criteria, technical constraints, and out-of-scope boundaries,
    including explicit decisions for manual drag behavior, failed-item recovery,
    ordering, truncation, navigation scope, and error handling expectations for
    the workflow Kanban board.
