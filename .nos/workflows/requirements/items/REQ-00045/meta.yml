  - >-
    Specification appended to `REQ-00045/index.md` with five user stories, 35
    numbered acceptance criteria covering store-level capture, actor attribution
    (`ui` / `agent:<adapter>` / `runtime`), per-workflow JSONL storage, SSE
    realtime, REST endpoints, both UI surfaces, and non-regression safety;
    technical constraints pin file/code touchpoints, the `ActivityEntry`
    discriminated union (with truncated SHA-256 body hashes — no body text
    stored), and the single-process append assumption; out-of-scope nails down
    workflow-level events, deletes, comments, filtering, retention, backfill,
    and runtime-flip coalescing. Defaulted Option B storage and the
    `/dashboard/activity` route per the analysis recommendation; locked the
    body-change payload to hash+length to keep the log bounded.
  - >-
    All 35 ACs implemented with TypeScript passing clean. Summary:


    Implemented activity logging for REQ-00045 across 19 files. New
    `lib/activity-log.ts` appends JSON lines to
    `.nos/workflows/<id>/activity.jsonl` and emits SSE `item-activity` events.
    `lib/workflow-store.ts` was instrumented to diff `title`, `stage`, `status`
    on every `updateItemMeta` call and emit per-changed-field entries;
    `createItem` emits `item-created`; `writeItemContent` compares body hashes
    and emits `body-changed` only when content differs. `lib/auto-advance.ts`
    passes `actor: "runtime"` on all runtime-driven status flips. Three item API
    routes read the `x-nos-actor` header (defaulting to `"ui"`); three NOS skill
    scripts now set `x-nos-actor: agent:claude`. Four new REST/SSE routes added
    (`/api/activity`, `/api/activity/events`, `/api/workflows/[id]/activity`,
    `/api/workflows/[id]/items/[itemId]/activity`). Per-item Activity section
    added to `ItemDetailDialog` with real-time SSE prepend and "No activity
    recorded yet." empty state. New `/dashboard/activity` page with global feed,
    SSE subscription, and "Load older" pagination. Dashboard gets a compact
    Recent Activity widget linking to the global page. Sidebar gains an Activity
    nav link. No deviations from spec.
