title: >-
  The content that send to Claude Code Adapter should include also the comment
  of the item
stage: Done
status: Todo
comments:
  - >-
    Analysis complete. The raw request (title only — index.md was empty) asks
    that item comments be included in the prompt sent to the Claude Code
    Adapter. Analysis is appended to index.md covering scope (change
    buildAgentPrompt + triggerStagePipeline to render item.comments into
    <item-content>), feasibility (low risk, single caller, but must keep the
    workflowId/itemId trailing-lines contract intact and fence comments to
    reduce prompt-injection ambiguity), dependencies (lib/system-prompt.ts,
    lib/stage-pipeline.ts; WorkflowItem.comments already exists), and open
    questions (ordering, placement vs trailing lines, per-comment format,
    whether to extend the comment schema with author/timestamp now or defer,
    re-run-on-reset semantics). Next stage should resolve the open questions —
    especially placement and per-comment format — before documentation.
  - >-
    Specification added to index.md. Resolved the open questions with the
    analysis-recommended defaults: comments render as a ## Comments section
    inside <item-content> between body and the trailing workflowId/itemId lines
    (preserves the standing prompt contract), chronological order, numbered ###
    Comment N subsections to keep multi-line markdown intact, empty/blank arrays
    emit nothing, no schema change. Touch points scoped to lib/system-prompt.ts
    (add optional comments field) and lib/stage-pipeline.ts (forward
    item.comments); types/workflow.ts and workflow-store.ts unchanged. Deferred
    explicitly: author/timestamp metadata, truncation policy, and
    .nos/system-prompt.md doc update.
  - >-
    Implementation complete. buildAgentPrompt in lib/system-prompt.ts now
    accepts an optional comments?: string[] | null and renders a ## Comments
    section with numbered ### Comment N subsections between the body and the
    trailing workflowId/itemId lines, preserving the standing prompt contract.
    Empty/null/all-blank arrays produce byte-identical output to the pre-change
    golden; blank entries are skipped without consuming a number; internal
    comment content (markdown headings, code fences, blank lines) is preserved
    verbatim, trailing whitespace trimmed. triggerStagePipeline in
    lib/stage-pipeline.ts forwards item.comments through. New
    lib/system-prompt.test.ts covers ACs 1/3/4/5/6/7/9 via 7 node --test cases,
    all passing. tsconfig.json gained allowImportingTsExtensions (required so
    Node 25's native TS runner can resolve the './system-prompt.ts' ESM import);
    package.json gained a 'test' script. Deviation from AC #10: npm run lint is
    pre-existing broken on main ('Invalid project directory provided, no such
    directory: .../lint') — reproduced on a clean stash, unrelated to this
    change; npx tsc --noEmit passes cleanly. Nothing touched outside the spec's
    allowed file set: types/workflow.ts, workflow-store.ts, UI, and the
    nos-comment-item skill are untouched. Next stage: consider a follow-up to
    fix the lint script and optionally document the ## Comments subsection in
    .nos/system-prompt.md.
  - >-
    Validation complete. All 10 acceptance criteria met: signature extension
    (AC1), caller wiring at lib/stage-pipeline.ts:23 (AC2), empty/null/all-blank
    equivalence to pre-change golden (AC3), placement between body and trailing
    workflowId/itemId lines (AC4), array-order rendering (AC5), numbered ###
    Comment N format with verbatim multi-line markdown preservation (AC6), blank
    filtering before numbering (AC7), ## Comments as sole delimiter — no new XML
    tag (AC8), and 7/7 node --test cases in lib/system-prompt.test.ts passing
    (AC9). AC10 marked partial: npx tsc --noEmit passes cleanly, but npm run
    lint fails with 'Invalid project directory provided, no such directory:
    .../lint' — reproduced on a clean git stash of main, so it is a pre-existing
    broken next lint script unrelated to this change. No regressions in adjacent
    files (types/workflow.ts, workflow-store.ts, UI, nos-comment-item skill all
    untouched). Appended ## Validation section to index.md. Advancing to Done.
