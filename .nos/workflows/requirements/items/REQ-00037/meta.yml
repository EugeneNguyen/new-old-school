    types/workflow.ts client-facing create payload type (if any) must drop id;
    (5) the non-conforming 'refactor heart beat' folder is explicitly out of
    scope. Verified pre-spec: nos-create-item.mjs already omits id, and
    lib/agent-adapter.ts has no createItem calls, so AC9 (no regression) should
    hold without further work.
