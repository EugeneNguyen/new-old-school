comments:
  - >-
    Analysis appended to index.md. Scope: remove the optional ID input from
    NewItemDialog.tsx and stop sending id in the create POST body; verify
    ItemDetailDialog has no editable ID; tighten
    app/api/workflows/[id]/items/route.ts so client-supplied ids are not
    honored. Out of scope: changing the auto-id generator and migrating existing
    non-conforming folders (e.g. 'refactor heart beat'). Open questions for the
    next stage: silently ignore vs. 400-reject a client-supplied id on
    create/edit, whether any skills/agents/tests still rely on supplying a
    custom id, and whether to keep the id parameter on createItem() in
    workflow-store.ts for internal use.
  - >-
    Analysis stage complete. Two sessions ran concurrently on this item (see
