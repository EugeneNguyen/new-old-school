    behavior.
  - >-
    Specification appended to index.md. User stories, 9 numbered acceptance
    criteria, technical constraints, and out-of-scope list are now in place. Key
    decisions resolving the open questions: (1) server silently ignores a
    client-supplied id on both POST /items and PATCH /items/:itemId (not 400) to
