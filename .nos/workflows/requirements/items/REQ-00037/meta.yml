    auto-generation path in lib/workflow-store.ts:427–448 — the existing
    analysis is accurate and complete, so I left it intact rather than
    overwriting. The next stage has five open questions to resolve, notably
    whether the create/edit API routes should also stop honoring client-supplied
    `id` or just hide it from the UI, and whether any skill/agent caller
    currently passes a custom id.
  - >-
    Specification appended to index.md. Decisions made on the open questions:
    server silently ignores client-supplied id on both create (POST) and edit
