title: Workflow Foundation
stage: Done
status: Todo
comments:
  - >-
    Analysis appended to index.md covering scope (in: .nos/ layout, stages.yaml,
    meta.yml/index.md schema, settings.yaml; out: engine runtime, UI, legacy
    migration), feasibility (high — schema already exists in-tree; main risks
    are schema drift across multiple writers, YAML edge cases, and ID-collision
    under concurrent mints), dependencies (REQ-011 engine, REQ-013 Kanban,
    REQ-014 skills, workflow-store/stage-pipeline/auto-advance), and 8 open
    questions for Documentation to resolve — most pressing: canonical status
    enum, comment record shape, ID-padding rule (REQ-011 vs REQ-00018
    inconsistency in-tree), and whether stage-section appends to index.md are
    idempotent on re-run.
  - >-
    Specification appended to index.md defining the canonical .nos storage
    contract: required workflow/item file paths, required fields and enums,
    append-only index.md behavior, whole-file meta.yml rewrites, session audit
    entries, ID minting and enumeration rules, validation behavior, technical
    constraints, and explicit out-of-scope boundaries for runtime, UI, richer
    comment schema, and migrations.
  - >-
    I appended the analysis to
    `.nos/workflows/requirements/items/REQ-012/index.md` and marked REQ-012 Done
    with a summary comment.


    The analysis defines the `.nos` layout/schema contract, calls out key risks
    like schema drift and ID collisions, lists dependencies on REQ-011/013/014
    plus workflow modules, and captures the main unresolved questions for the
    Documentation stage.
  - >-
    I appended `## Specification` to
    `.nos/workflows/requirements/items/REQ-012/index.md` with user stories,
    numbered acceptance criteria, technical constraints, and out-of-scope
    boundaries. I also recorded the stage summary in `REQ-012/meta.yml`; note
    the workflow metadata now shows the item has already moved to
    Implementation, so I left that current stage state intact.
  - >-
    I have implemented the storage contract defined in REQ-012.


    **Key changes in `lib/workflow-store.ts`:**

    - **Strict Validation**: Replaced silent normalization with explicit
    validation. `readWorkflowConfig`, `readStages`, and `readItemFolder` now
    return `null` if the files do not strictly adhere to the required schemas
    (e.g., missing required fields, invalid status enums, or malformed session
    entries).

    - **ID Minting**: Implemented a dynamic padding rule that preserves the
    widest numeric width present in the workflow directory, defaulting to a
    minimum of three digits.

    - **Item Enumeration**: Updated `listItems` to only recognize directories
    that contain both `index.md` and `meta.yml`.

    - **Session Audit Log**: Removed the behavior that pruned sessions when an
    item returned to `Todo`, ensuring a permanent audit log.

    - **Creation Defaults**: New items now initialize with an empty `sessions:
    []` array.


    Verified with `npx tsc --noEmit` (passed). Note that one unrelated existing
    test failure in `lib/use-workflow-items.test.ts` (module resolution error)
    remains, but is not a regression of this work.


    REQ-012 is now marked as `Done`.
  - >-
    Validation is appended to
    `.nos/workflows/requirements/items/REQ-012/index.md`.


    Result: 15 ACs pass, 1 fails. The failure is AC3: the spec requires every
    stage to have string `prompt` and boolean `autoAdvanceOnComplete`, but
    `.nos/workflows/requirements/config/stages.yaml` still has `null` values for
    `Backlog` and `Done`, so the live requirements workflow is not compliant
    with its own schema. Next step is to fix that file and re-run validation.
