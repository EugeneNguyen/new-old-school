title: When npx nos init, i got the error
stage: Done
status: Todo
comments:
  - >-
    Analysis complete for REQ-00090. The root cause is the legacy `bin/cli.js` —
    a CJS entry point that unconditionally starts the Next.js dev server with no
    command dispatch. The modern `bin/cli.mjs` already handles `init` correctly
    (exits after scaffolding), but if `npx` or a cached install resolves to the
    old `.js` file, the server starts and hits the `EADDRINUSE` error. The
    simplest fix is removing `bin/cli.js` entirely since `package.json` already
    points to `cli.mjs`. The analysis has been appended to the item's
    `index.md`.
  - >-
    Perfect! I've written and appended the formal specification for REQ-00090.
    The specification includes:


    **User Stories** — Two stories covering the developer's need to initialize
    NOS without server startup and the consistency expectation with `nos
    update`.


    **Acceptance Criteria** — Six testable criteria covering successful
    execution, no port binding, no server messages, scaffolding completion, no
    regressions to the default `nos` command, and unchanged `update` behavior.


    **Technical Constraints** — Four constraints tied directly to the WBS
    dictionary (1.7.1 CLI Entry Point, 1.7.4 Workspace Scaffolding) and glossary
    terms, specifying that `bin/cli.mjs` must be the primary entry point,
    scaffolding must exit via `process.exit()`, and template management must
    respect the `NOS_TEMPLATES_ROOT` environment variable.


    **Out of Scope** — Clarifies that port changes, TUI refactoring, and changes
    to `nos update` are explicitly excluded.


    **RTM Entry** — Documents the requirement in the traceability matrix with
    links to design artifacts, implementation files (`bin/cli.mjs`,
    `bin/cli.js`, `lib/scaffolding.mjs`), and test coverage in
    `lib/scaffolding.test.ts`.


    **WBS Mapping** — Traces the requirement to two WBS packages: 1.7.1 (CLI
    Entry Point) and 1.7.4 (Workspace Scaffolding), identifying the deliverables
    affected.


    The specification is now ready for implementation.
