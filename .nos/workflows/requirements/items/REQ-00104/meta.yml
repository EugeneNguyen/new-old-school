  - text: >-
      All 6 acceptance criteria for REQ-00104 are now implemented:


      **AC-1** (`instrumentation.ts`): Process-level `uncaughtException` and
      `unhandledRejection` handlers installed on server startup — log to
      `~/.nos/runtime/server.log` with `[UNCAUGHT]`/`[UNHANDLED]` prefix and ISO
      timestamp, process continues running (best-effort resilience).


      **AC-2** (`lib/auto-advance-sweeper.ts`): The sweeper now falls back to 60
      000 ms when `readHeartbeatMs()` throws, and unconditionally reschedules
      after `tick()` even if tick throws. Previously, `readHeartbeatMs()`
      failure caused `schedule()` to return early, permanently stopping the
      heartbeat.


      **AC-3** (`lib/auto-advance-sweeper.ts`): Added structured lifecycle
      logging — tick start, tick end (with sweep count and duration), and
      next-tick scheduling. Exported `lastTickDurationMs` and
      `lastTickItemsSwept` for the health endpoint.


      **AC-4** (`app/api/health/route.ts` new): `GET /api/health` returns `{
      status: "ok", uptime, heartbeat: { lastTickAt, lastTickDurationMs,
      lastTickItemsSwept, nextTickIn, stale } }` — `stale: true` when last tick
      was more than 3× the interval ago.


      **AC-5** (`bin/cli.mjs`): When `isAlive()` returns false with a lockfile
      present, the CLI now auto-restarts the server and re-checks liveness
      rather than deleting the lockfile and showing "Run in background."


      **AC-6** (log format): All runtime log calls in `auto-advance-sweeper.ts`,
      `auto-advance.ts`, and `stage-pipeline.ts` now use `[<ISO-timestamp>]
      [<component>] <message>` format. Also updated `error-handling-strategy.md`
      with a Process-Level Error Handling section documenting the new behaviors.
    createdAt: '2026-04-23T01:06:32.332Z'
    updatedAt: '2026-04-23T01:06:32.332Z'
