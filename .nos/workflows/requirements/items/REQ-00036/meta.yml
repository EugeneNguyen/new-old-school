title: Able to switch between display in list and display in kanban
stage: Done
status: Todo
comments:
  - >-
    Analysis complete. index.md was empty, so I wrote the original title as a
    one-line summary at the top (not modifying any prior request text) and
    appended the Analysis section covering scope, feasibility, dependencies, and
    open questions. Key finding: this is a presentation-only change with low
    risk; the main effort is lifting shared state (items, events subscription,
    dialogs, self-origination tracking) out of KanbanBoard into a parent or hook
    so a new ListView can reuse it. Six open questions for the documentation
    stage — most importantly default view, persistence scope (global vs
    per-workflow localStorage), and list grouping/columns.
  - >-
    Added ## Specification to index.md: 6 user stories, 14 numbered acceptance
    criteria (Given/When/Then where useful), technical constraints (files to
    touch, new useWorkflowItems hook, per-workflow localStorage key
    nos:workflow:<id>:viewMode, reuse of existing types and UI primitives,
    SSR/quota guards, baseline a11y), and an explicit out-of-scope list.
    Resolved the open questions inline: default=Kanban, persistence=per-workflow
    localStorage, list grouped by stage then sorted by updatedAt desc, columns
    Title/Stage/Status/Agent/Updated, failed items keep destructive Badge, full
    arrow-key nav deferred. No code written.
  - >-
    I have completed the analysis for REQ-00036. I updated `index.md` with a
    comprehensive analysis section covering scope, feasibility, dependencies,
    and open questions, then marked the item as `Done` and added a summary
    comment.
