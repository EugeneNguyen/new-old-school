title: >-
  In other workspace (PersonalBranding), the item start the claude, change to in
  progress, but when the claude finished, it not change to done
stage: Done
status: Todo
comments:
  - >-
    [runtime] session log stalled; Now I have a complete picture. Let me write
    the brainstorming section. The bug is: in another workspace
    (PersonalBranding), items get started (set to "In Progress") but never
    transition to "Done" when the Claude session finishes. The core mechanism
    for completion is `completeSessionIfFinished` which checks for idle session
    log files in `.claude/sessions/`.
  - >-
    Analysis complete. I appended an `## Analysis` section to REQ-00077's
    `index.md` covering scope, feasibility, dependencies, and open questions.


    **Summary:** The bug is that items in non-primary workspaces
    (PersonalBranding) get stuck at "In Progress" because
    `completeSessionIfFinished` cannot find the session log file. The most
    likely root cause is a path mismatch — either `AsyncLocalStorage` context
    isn't propagating correctly to `sessionsDir()` during the sweeper tick, or
    `child.unref()` in the adapter causes the log file to be incomplete/absent.
    The key diagnostic step is verifying where the session log file physically
    resides after the Claude session completes. No implementation changes were
    made — only analysis was appended.
  - >-
    Specification written. I appended a `## Specification` section to
    REQ-00077's `index.md` with 2 user stories, 6 testable acceptance criteria
    (using Given/When/Then), 8 technical constraints grounded in the actual
    source code paths, and 6 explicit out-of-scope items to prevent scope creep.
    The spec focuses on ensuring `getProjectRoot()` resolves consistently across
    session creation and completion detection for non-primary workspaces, plus
    adding observability (logging) when the silent `statSync` failure occurs. No
    code changes were made — only specification was authored.
  - >-
    Implementation complete. Here's a summary of the changes:


    **`lib/auto-advance-sweeper.ts`** — Fixed `tick()` to always include the
    primary project root in the sweep loop. Previously, once workspaces were
    registered, the primary project was excluded entirely, causing its items to
    never transition to Done.


    **`lib/auto-advance.ts`** — Three improvements to
    `completeSessionIfFinished`:

    1. Replaced the silently-failing `statSync` catch with a `console.warn` that
    logs the resolved root path, session ID, and item ID (AC4).

    2. Added `MAX_SESSION_DURATION_MS` (30 min) force-completion — if the log
    file can't be found but the session has been running longer than the max,
    the item is forced Done with a diagnostic comment (AC5).

    3. Inlined path resolution with an explicit `getProjectRoot()` capture,
    removing the unused `sessionsDir()` helper and making the resolved root
    visible in logs for debugging (AC2/AC3).


    All acceptance criteria are satisfied and TypeScript compiles cleanly.
  - >-
    Validation complete. All 6 acceptance criteria pass: `tick()` in
    `auto-advance-sweeper.ts` now always includes the primary root (AC1),
    session log write and lookup paths both resolve via `getProjectRoot()`
    inside the same `runWithProjectRoot` scope (AC2/AC3), `statSync` failures
    emit `console.warn` with full diagnostic context instead of silently
    returning null (AC4), `MAX_SESSION_DURATION_MS` (30min) force-completes
    stuck sessions (AC5), and stalled-log detection with `[runtime] session log
    stalled` prefix is preserved end-to-end for non-primary workspaces now that
    path resolution is fixed (AC6). No regressions found in primary workspace
    behavior. Validation section appended to `index.md` and pushed.
