    ---


    ## Implementation Summary


    All 12 acceptance criteria for REQ-00093 have been satisfied:


    **Created:**

    - `types/chat.ts` — consolidated `ChatMessage` interface (superset of both
    local definitions)

    - `components/chat/ChatBubble.tsx` — `cva`-driven component with `role` +
    `variant` props; terminal uses monospace `<pre>` with role-colored labels,
    widget uses rounded `<div>` with directional margin and background

    - `components/chat/MessageList.tsx` — wraps `ScrollArea` with internal
    auto-scroll-to-bottom via `useRef` + `useEffect`; accepts `messages`,
    `renderMessage` callback, `className`, `emptyContent`

    - `components/chat/TypingIndicator.tsx` — `Loader2` spinner with
    configurable label (default "Thinking...")

    - `components/chat/ChatInput.tsx` — text input with submit-on-Enter,
    optional `promptPrefix` (e.g., `>`), optional `addonSlot` for popup UI

    - `components/chat/index.ts` — barrel re-exporting all shared components and
    `ChatMessage` type

    - `components/chat/ToolUseCard.tsx` + `components/chat/QuestionCard.tsx` —
    relocated from `components/terminal/`


    **Modified:**

    - `app/dashboard/terminal/page.tsx` — removed ~100 lines of inline
    rendering; composes `ChatBubble` (terminal variant), `MessageList`,
    `TypingIndicator`, `ChatInput`; terminal-specific features (SessionPanel,
    SlashPopup, session header) preserved

    - `components/dashboard/ChatWidget.tsx` — removed ~80 lines of inline
    rendering; composes `ChatBubble` (widget variant), `MessageList`,
    `TypingIndicator`; widget-specific features (FAB toggle, stop/new-session
    buttons, agent check) preserved


    **Deleted:**

    - `components/terminal/ToolUseCard.tsx` and
    `components/terminal/QuestionCard.tsx` (relocated)


    No new dependencies introduced; all shared components use existing
    primitives from `components/ui/` and `lucide-react`. TypeScript compiles
    cleanly (the only remaining warnings are pre-existing unrelated issues).
