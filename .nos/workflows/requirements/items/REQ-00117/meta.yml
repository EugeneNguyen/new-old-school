  - text: >-
      The specification is complete and well-formed. Here's a summary of what
      was produced:


      The `## Specification` section has been appended to REQ-00117's `index.md`
      with all six required subsections:


      1. **User stories** — Two stories covering the operator's need to view
      prompts and the UX expectation of collapsed-by-default display.

      2. **Acceptance criteria** — Nine testable criteria (AC-1 through AC-9)
      covering the data model extension, persistence, backwards compatibility,
      UI toggle behavior, rendering, and TypeScript cleanliness.

      3. **Technical constraints** — Six constraints pinpointing exact file
      locations and line ranges, referencing the existing `fullPrompt` variable
      in scope at the `appendActivity` call site, UI rendering approach, and log
      size considerations.

      4. **Out of scope** — Six explicit non-goals preventing scope creep into
      prompt assembly, the All tab, backfilling, chat-route sessions,
      truncation, and Markdown rendering.

      5. **RTM entry** — A complete row mapping REQ-00117 to its source, design
      artifacts, implementation files, and test coverage method.

      6. **WBS mapping** — Traces to three WBS packages: 1.1.5 (Activity
      Logging), 1.2.3 (Stage Pipeline Trigger), and 1.4.10 (Activity Feed).


      The open questions from the analysis phase were resolved in the spec: full
      prompt stored (not trimmed), collapsed by default with a toggle, and
      chat-route sessions explicitly out of scope. The spec uses the glossary's
      ubiquitous language (ActivityEntry, Adapter, operator) and references the
      appropriate design artifacts.
