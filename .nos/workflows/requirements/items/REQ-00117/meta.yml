  - text: >-
      All acceptance criteria for REQ-00117 have been implemented:


      - **AC-1 (Data model)**: Added `prompt?: string` to the `session-started`
      variant in `lib/activity-log.ts:35`.

      - **AC-2 (Persistence)**: `lib/stage-pipeline.ts` now passes `prompt:
      fullPrompt` to `appendActivity()`.

      - **AC-3 (Backwards compat)**: The field is optional — existing entries
      parse without errors.

      - **AC-4 (Commands tab display)**: Each command card renders a "Show
      prompt" / "Hide prompt" toggle when `d.prompt` is present.

      - **AC-5 (Default collapsed)**: Prompt section is hidden by default;
      toggle reveals it.

      - **AC-6 (Prompt rendering)**: Prompt displayed in a `<pre>` block with
      `whitespace-pre-wrap` and `overflow-x-auto` for long lines.

      - **AC-7 (Absent prompt graceful)**: Toggle only renders when `d.prompt
      !== undefined` — no empty sections for old entries.

      - **AC-8 (All tab unchanged)**: No changes to the All tab compact row
      view.

      - **AC-9 (TypeScript clean)**: All modified files compile without errors.
