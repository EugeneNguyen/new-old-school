      current activity page is a flat list with no tabs. Re-implementation is
      straightforward: three files need changes (`lib/activity-log.ts` for the
      type, `lib/stage-pipeline.ts` to pass the prompt, and
      `app/dashboard/activity/page.tsx` for the tabbed UI with command cards and
      prompt toggle). All required data and variables are already in scope. The
      analysis has been appended to the item's `index.md` covering Scope,
      Feasibility, Dependencies, and Open Questions.
