  - text: >-
      Implementation of REQ-00117 is complete. Here's what was done:


      **Changes across 3 files:**


      1. **`lib/activity-log.ts`** — Added `prompt?: string` to the
      `session-started` variant (optional for backwards compat).


      2. **`lib/stage-pipeline.ts`** — Added `prompt: fullPrompt` to the
      `appendActivity()` data payload.


      3. **`app/dashboard/activity/page.tsx`** — Rewrote the page with:
         - Tab bar (All / Commands), "All" default
         - All tab renders the original compact row list unchanged
         - Commands tab filters `session-started` entries client-side and renders them as cards (adapter badge, command+args code block, model, stage, sessionId, workflow/item link)
         - "Show prompt" / "Hide prompt" toggle per card (collapsed by default)
         - `formatSummary()` handles `session-started` explicitly

      All 11 acceptance criteria are satisfied and TypeScript compiles clean.
      The "Load older" button appears only in the All tab (Commands tab reuses
      the same pagination, filtered client-side — a v1 tradeoff per spec). The
      only deviation from documented standards is using a plain `<button>` for
      the tab bar instead of the `Button` component (which lacks a tab variant),
      styled consistently with Tailwind.
