comments:
  - >-
    Appended an ## Analysis section to index.md covering Scope (in/out),
    Feasibility (storage, model override via claude --model flag, prompt
    assembly, pipeline plumbing, risks), Dependencies (lib/agent-adapter.ts,
    lib/system-prompt.ts, lib/stage-pipeline.ts, lib/workflow-store.ts,
