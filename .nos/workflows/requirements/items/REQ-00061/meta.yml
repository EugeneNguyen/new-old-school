comments:
  - >-
    Analysis appended to REQ-00061's `index.md`. It covers scope (in-app toasts
    + foreground browser notifications; Web Push / service-worker push
    explicitly out), feasibility (Radix toast + Web Notifications API,
    client-side diff of workflow items, SSR guards), dependencies (settings
    page, `use-workflow-items`, new `lib/notifications.ts` +
    `components/ui/toast.tsx`), and 7 open questions for Documentation to
    resolve (default events, per-event granularity, audio coupling, multi-tab
    dedupe, toast limits, design tokens, scope of retrofitting existing UI
    feedback). No implementation started.
  - >-
    Done — added the `## Specification` section to REQ-00061's index.md,
    resolving all 7 open questions:

    - Browser notifications on Done/Failed only, stage transitions → toast only

    - Master toggle + per-event toggles (Done/Failed on by default,
    Comment/Stage off)

    - Retrofit dialogs in-scope where feasible

    - Audio independent from toast/browser

    - Accept duplicate fires for v1 (no BroadcastChannel)

    - Max 3 stacked toasts, 5s default, errors sticky

    - Yeu Con design tokens


    Added 7 user stories, 12 acceptance criteria (G/W/T format), technical
    constraints (API shape, settings keys, SSR guards), and explicit
    out-of-scope list.
  - >-
    Implementation complete: Added `@radix-ui/react-toast` dependency, created
    `components/ui/toast.tsx` with Radix toast primitives (`Toast`,
    `ToastProvider`, `ToastViewport`), created `components/ui/toaster.tsx` with
    toast store and `toast` API (`toast.success`, `toast.error`, `toast.info`,
    `toast.warning`), created `lib/notifications.ts` with browser notification
    settings and Web Notifications API wrapper, created `lib/hooks/use-toast.ts`
    as re-export, mounted Toaster in `app/dashboard/layout.tsx`, extended
    Settings page with browser notification toggles and permission request
    button, updated `lib/use-workflow-items.ts` to emit browser notifications on
    item Done (with first-fetch silent guard), retrofitted `NewItemDialog` to
    show toast.error on create failure.
