  - >-
    Validation appended to `index.md` and pushed. **Verdict: 7 ✅ / 4 ⚠️ / 1 ❌
    across 12 ACs — stays in Validate.**


    Hard fail: AC-6 (no `FAILED:` detection anywhere; failed-item notifications
    never fire). Partials: AC-8 (Failed half can't be exercised), AC-11 (no
    toast fallback on permission denied), AC-12 (`NewItemDialog` shows both
    toast *and* inline banner). Two extra Technical-Constraint bugs:
    `setToastMuted` import is shadowed by the React state setter at
    `settings/page.tsx:72` so the mute pref never persists, and
    `toast.success/info/warning` ignore `isToastMuted()` entirely. `npx tsc
    --noEmit` and `npm test` both pass — issues are functional, not type/test
    failures. Five concrete follow-ups listed in the Validation section.
