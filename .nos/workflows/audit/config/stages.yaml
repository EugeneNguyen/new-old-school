- name: Update technology standard
  description: >-
    Research the current standard for the tech stack and update the
    documentation.
  prompt: >
    You are performing a standards audit for this project.


    Steps:

    1. **Identify the tech stack** — Read `package.json`, config files, and key
    source files to determine the languages, frameworks, libraries, and tools in
    use (e.g. Next.js, TypeScript, Tailwind, testing frameworks).


    2. **Research current standards** — For each major technology identified,
    look up the latest best-practice standards: official style guides,
    recommended patterns, deprecated APIs, and community conventions. Focus on
    what is current as of today.


    3. **Document or update** — Find or create a standards document for this
    project (`docs/standards/`). For each technology, write or update a section
    covering: recommended patterns, anti-patterns to avoid, version-specific
    notes, and any project-specific conventions already in use.


    4. **Flag gaps** — If the codebase deviates from the current standard, note
    each gap explicitly so the next stage (Check naming convention) can address
    them.


    End with a one-paragraph summary of the tech stack identified and the
    standards documented or updated.
  autoAdvanceOnComplete: true
  agentId: null
- name: Audit with the technology standard
  description: >-
    Audit the codebase against the documented technology standards and flag
    violations.
  prompt: >
    You are auditing the codebase against the technology standards documented in
    the previous stage.


    Steps:

    1. **Read the standards** — Load `docs/standards/` to understand the
    expected patterns, naming conventions, anti-patterns, and version-specific
    rules for each technology in use.


    2. **Scan the codebase** — Systematically review source files for deviations
    from the documented standards. Focus on:
       - Naming conventions (files, variables, functions, components, types)
       - Deprecated APIs or patterns that should be replaced
       - Anti-patterns explicitly called out in the standards document
       - Structural conventions (folder layout, module boundaries, export styles)


    3. **Document findings** — For each violation found, record it in the item's
    `index.md` under a `## Audit Findings` section with:
       - File path and line reference
       - The standard violated
       - The current (wrong) pattern and the expected (correct) pattern
       - Severity: `High` (correctness/security), `Medium` (maintainability),
         `Low` (style)


    4. **Summarise** — Add a `## Summary` section with a count of findings by
    severity and a short overall assessment (compliant / minor issues / needs
    work).


    End with a one-paragraph summary of findings and whether the codebase is
    broadly compliant with the documented standards.
  autoAdvanceOnComplete: true
  agentId: null
- name: Fix audit findings
  description: Implement fixes for all violations identified in the audit report.
  prompt: >
    You are fixing codebase violations identified in the previous audit stage.


    Steps:

    1. **Read the audit report** — Load the item's `index.md` and review every
    entry under `## Audit Findings`. Understand the standard violated, the
    current pattern, and the expected pattern for each finding.


    2. **Plan before editing** — Group findings by file and severity. Fix `High`
    severity issues first, then `Medium`, then `Low`. Note any findings that are
    too risky to auto-fix (e.g. require a larger refactor) — mark those as
    deferred rather than skipping silently.


    3. **Apply fixes** — Edit each file to bring it in line with the documented
    standard. Follow existing project conventions (see `CLAUDE.md`). Do not
    introduce scope creep — fix only what the audit flagged.


    4. **Update the report** — In the item's `index.md`, add a `## Fix Log`
    section listing each finding as `u2705 Fixed`, `u23f8 Deferred (reason)`, or
    `u274c Skipped (reason)`.


    5. **Commit** — Stage and commit all changed files with a message
    summarising the audit fixes applied.


    End with a one-paragraph summary of what was fixed, what was deferred, and
    whether the codebase is now compliant.
  autoAdvanceOnComplete: true
  agentId: null
- name: Update documentation standard
  description: >-
    Create or update project documentation artifacts: WBS, WBS dictionary,
    requirement traceability matrix, database design, UI design, UX design,
    and user journey.
  prompt: >
    You are updating the project's documentation standard artifacts.


    Read the item's `index.md` and `meta.yml` to understand the project context.
    Then create or update the following documentation artifacts in
    `docs/standards/`:


    1. **WBS (Work Breakdown Structure)** — Decompose the project deliverables
    into a hierarchical tree of work packages. Save as
    `docs/standards/wbs.md`.


    2. **WBS Dictionary** — For each WBS work package, document: ID, name,
    description, owner, estimated effort, dependencies, and acceptance criteria.
    Save as `docs/standards/wbs-dictionary.md`.


    3. **Requirement Traceability Matrix (RTM)** — Map each requirement to its
    source, design artifact, implementation file(s), and test coverage. Save as
    `docs/standards/rtm.md`.


    4. **Database Design** — Document the data model: entities, attributes,
    relationships, indexes, and constraints. Include an ER diagram in Mermaid
    syntax. Save as `docs/standards/database-design.md`.


    5. **UI Design** — Document the component inventory, layout conventions,
    color tokens, typography scale, and spacing system in use. Reference
    existing design system tokens where applicable. Save as
    `docs/standards/ui-design.md`.


    6. **UX Design** — Document interaction patterns, error handling conventions,
    loading states, accessibility requirements (WCAG level), and form validation
    rules. Save as `docs/standards/ux-design.md`.


    7. **User Journey** — Map the primary user journeys through the application:
    entry points, key steps, decision points, and exit states. Use Mermaid
    flowcharts. Save as `docs/standards/user-journey.md`.


    For each artifact, check whether an existing file already exists and update
    it rather than overwriting from scratch where possible.


    End with a one-paragraph summary listing which artifacts were created,
    updated, or skipped (with reason).
  autoAdvanceOnComplete: true
  agentId: null
- name: Audit with the doc standard
  description: >-
    Audit the project against the documentation standard artifacts and flag
    gaps or inconsistencies.
  prompt: >
    You are auditing the project against the documentation standard artifacts
    produced in the previous stage.


    Steps:


    1. **Read the documentation standards** — Load all artifacts in
    `docs/standards/`: WBS, WBS dictionary, RTM, database design, UI design,
    UX design, and user journey.


    2. **Scan the project** — Systematically compare the documentation against
    the actual codebase and existing docs. Check for:
       - Requirements in the RTM that lack implementation or test coverage
       - Database schema deviations from the documented design
       - UI components that violate the documented design tokens or layout conventions
       - UX flows that deviate from documented interaction patterns or accessibility rules
       - User journeys that are broken, missing, or undocumented
       - WBS work packages that have no corresponding implementation evidence


    3. **Document findings** — Record each gap in the item's `index.md` under a
    `## Doc Audit Findings` section with:
       - Artifact affected (e.g. RTM, UI Design)
       - The specific gap or inconsistency
       - File path or section reference
       - Severity: `High` (missing critical artifact or broken journey),
         `Medium` (inconsistency or stale content), `Low` (minor gap or style)


    4. **Summarise** — Add a `## Doc Audit Summary` section with a count of
    findings by severity and an overall compliance verdict.


    End with a one-paragraph summary of findings and overall documentation health.
  autoAdvanceOnComplete: true
  agentId: null
- name: Fix doc audit findings
  description: Resolve all gaps and inconsistencies found in the documentation audit.
  prompt: >
    You are fixing documentation gaps identified in the previous doc audit stage.


    Steps:


    1. **Read the audit report** — Load the item's `index.md` and review every
    entry under `## Doc Audit Findings`. Understand the artifact affected, the
    gap, and the expected state for each finding.


    2. **Plan before editing** — Group findings by artifact and severity. Address
    `High` severity issues first, then `Medium`, then `Low`. Note any findings
    that require decisions beyond documentation (e.g. missing implementation) —
    mark those as deferred.


    3. **Apply fixes** — Update the relevant files in `docs/standards/` to
    close each gap. Do not introduce scope creep — fix only what the audit
    flagged.


    4. **Update the report** — In the item's `index.md`, add a `## Doc Fix Log`
    section listing each finding as `u2705 Fixed`, `u23f8 Deferred (reason)`, or
    `u274c Skipped (reason)`.


    5. **Commit** — Stage and commit all changed files with a message
    summarising the documentation fixes applied.


    End with a one-paragraph summary of what was fixed, what was deferred, and
    whether the documentation is now consistent with the codebase.
  autoAdvanceOnComplete: true
  agentId: null
