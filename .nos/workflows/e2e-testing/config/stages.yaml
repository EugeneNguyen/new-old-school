- name: Analyze
  description: >-
    Analyze the feature or user story to identify test scenarios, acceptance
    criteria, and edge cases for end-to-end coverage.
  prompt: >
    You are preparing an E2E test plan for a feature or user story.


    Steps:


    1. **Read the item** — Load this item's `index.md` to understand the feature
    or user journey to be tested.


    2. **Read related requirements** — Check `.nos/workflows/requirements/items/`
    for any linked requirements. Read their `index.md` and `meta.yml` to extract
    acceptance criteria, edge cases, and technical constraints.


    3. **Identify test scenarios** — List the user-facing flows to verify:
       - Happy path (primary success scenario)
       - Edge cases (empty states, boundary values, optional fields)
       - Error paths (invalid input, network failures, auth errors)
       - Accessibility and cross-browser concerns if applicable


    4. **Document the test plan** — Update the item's `index.md` with a
    `## Test Plan` section listing each scenario as a checkbox, the target URL
    or component, the preconditions, and the expected outcome.


    5. **Identify test data** — Note any fixtures, seed data, or mock API
    responses needed to run the tests reliably.


    End with a one-paragraph summary of the feature under test, the number of
    scenarios identified, and any risks or unknowns that may complicate testing.
  autoAdvanceOnComplete: true
  agentId: null
- name: Write Tests
  description: >-
    Implement the E2E test scripts based on the test plan from the previous
    stage.
  prompt: >
    You are writing end-to-end tests for the scenarios documented in the
    previous stage.


    Steps:


    1. **Read the test plan** — Load the item's `index.md` and review every
    scenario listed under `## Test Plan`.


    2. **Check the testing setup** — Read `package.json` to identify the E2E
    framework in use (Playwright, Cypress, etc.). Read any existing test files
    under `e2e/`, `tests/`, or `__tests__/` to understand conventions, helpers,
    and fixture patterns already in place.


    3. **Implement the tests** — For each scenario in the test plan:
       - Create or update a test file in the appropriate directory
       - Write descriptive `test` / `it` blocks matching the scenario name
       - Use page object models or existing helpers where available; do not
         duplicate selector logic that already exists
       - Assert meaningful outcomes (URL, visible text, element state, API
         response) — avoid brittle assertions on implementation details
       - Seed or mock only what is necessary for the test to be deterministic


    4. **Mark scenarios done** — In the item's `index.md`, tick each checkbox
    under `## Test Plan` as you implement it.


    5. **Lint and type-check** — Run `npm run lint` (or equivalent) and fix
    any errors introduced by the new test files.


    End with a one-paragraph summary of the tests written, files created or
    modified, and any scenarios deferred with a reason.
  autoAdvanceOnComplete: true
  agentId: null
- name: Run & Fix
  description: >-
    Execute the E2E test suite, triage failures, and fix broken tests or
    application bugs found.
  prompt: >
    You are running the E2E tests and resolving any failures.


    Steps:


    1. **Run the tests** — Execute the E2E suite with the project's test command
    (e.g. `npx playwright test`, `npx cypress run`). Capture the full output.


    2. **Triage failures** — For each failing test:
       - Determine whether the failure is a test bug (wrong selector, flaky
         assertion, missing await) or an application bug (real regression or
         unimplemented behaviour)
       - Log each failure in the item's `index.md` under a `## Test Results`
         section with: test name, failure type (test bug / app bug), error
         message, and proposed fix


    3. **Fix test bugs** — Correct flaky assertions, broken selectors, and
    timing issues directly in the test files.


    4. **Fix application bugs** — If a failure reveals a real application bug,
    fix the application code. Document the fix in `## Test Results` as
    `✅ App bug fixed`.


    5. **Re-run** — After fixes, run the suite again to confirm all tests pass.
    Repeat until the suite is green or remaining failures are explicitly
    deferred.


    6. **Commit** — Stage and commit test files and any application fixes with
    a message summarising what was tested and what was fixed.


    End with a one-paragraph summary: how many tests passed, failed, or were
    deferred, and the overall health of the feature under test.
  autoAdvanceOnComplete: true
  agentId: null
- name: Review
  description: >-
    Review test coverage, quality, and maintainability. Flag gaps and confirm
    the suite is ready to merge.
  prompt: >
    You are reviewing the E2E test suite for coverage, quality, and
    maintainability.


    Steps:


    1. **Check coverage against the test plan** — Load the item's `index.md`
    and verify every scenario in `## Test Plan` is implemented and passing.
    Flag any unchecked scenarios.


    2. **Assess test quality** — Review each test file for:
       - Descriptive names that communicate intent
       - Absence of hardcoded waits (`sleep`, `waitFor` with magic numbers)
       - No over-assertion on implementation details (classes, IDs that may
         change)
       - Proper use of shared helpers and page objects
       - Test isolation (no shared mutable state between tests)


    3. **Check for gaps** — Identify any critical paths, error states, or
    accessibility concerns not yet covered. Add them to the item's `index.md`
    under `## Coverage Gaps` if found.


    4. **Confirm CI readiness** — Verify the tests can run in CI (no
    hardcoded local URLs, credentials in env vars, deterministic seeds).


    5. **Final summary** — Update the item's `index.md` with a `## Review
    Outcome` section: overall verdict (Ready / Needs Work), a list of
    quality issues found, and any deferred coverage gaps.


    End with a one-paragraph summary of the review outcome and whether the
    test suite is ready to merge.
  autoAdvanceOnComplete: true
  agentId: null
- name: Done
  description: null
  prompt: null
  autoAdvanceOnComplete: false
  agentId: null
  maxDisplayItems: 10
